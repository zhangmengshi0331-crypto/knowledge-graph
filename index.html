<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产业链知识图谱</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #22c55e;
            --bg: #f8fafc;
            --sidebar: #fff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #64748b;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 380px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
        .sidebar-header h1 { font-size: 18px; margin-bottom: 4px; }
        .sidebar-header p { font-size: 12px; opacity: 0.85; }
        .search-section { padding: 16px; border-bottom: 1px solid var(--border); }
        .search-wrapper { display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
        .search-input:focus { border-color: var(--primary); }
        .depth-input { width: 70px; padding: 12px 8px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; text-align: center; }
        .depth-input:focus { border-color: var(--primary); }
        .depth-input::placeholder { color: #cbd5e1; font-size: 12px; }
        .search-btn { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .search-btn:hover { background: #2563eb; }
        .depth-info { margin-top: 10px; padding: 10px; background: #eff6ff; border-radius: 6px; font-size: 11px; color: #1d4ed8; }
        .node-detail { flex: 1; overflow-y: auto; padding: 16px; }
        .detail-placeholder { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .detail-placeholder svg { width: 60px; height: 60px; margin-bottom: 12px; opacity: 0.3; }
        .detail-card { background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .detail-header { padding: 14px; background: #f8fafc; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .detail-type-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .detail-type-badge.industry { background: #dbeafe; color: #1d4ed8; }
        .detail-type-badge.product { background: #dcfce7; color: #15803d; }
        .detail-type-badge.material { background: #fef3c7; color: #b45309; }
        .detail-type-badge.unknown { background: #f1f5f9; color: #64748b; }
        .detail-title { font-size: 16px; font-weight: 600; }
        .detail-body { padding: 14px; }
        .detail-description { font-size: 13px; line-height: 1.6; color: var(--text-secondary); margin-bottom: 12px; }
        .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .detail-meta-item { padding: 4px 8px; background: #f1f5f9; border-radius: 4px; font-size: 11px; }
        .detail-section { margin-top: 14px; }
        .detail-section-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .detail-section-title.upstream { color: var(--warning); }
        .detail-section-title.downstream { color: var(--success); }
        .relation-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .relation-tag { padding: 6px 12px; background: #f8fafc; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; }
        .relation-tag:hover { background: #eff6ff; border-color: var(--primary); color: var(--primary); }
        .relation-tag.upstream { border-left: 3px solid var(--warning); }
        .relation-tag.downstream { border-left: 3px solid var(--success); }
        .legend { padding: 12px; background: #f8fafc; border-top: 1px solid var(--border); }
        .legend-title { font-size: 10px; color: var(--text-secondary); margin-bottom: 8px; }
        .legend-items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .graph-container { flex: 1; position: relative; background: #f0f2f5; }
        #graph { width: 100%; height: 100%; }
        .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--text-secondary); z-index: 5; }
        .empty-state.hidden { display: none; }
        .empty-state svg { width: 80px; height: 80px; margin-bottom: 16px; opacity: 0.3; }
        .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
        .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .loading-overlay.hidden { display: none; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .graph-controls { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
        .control-btn { width: 36px; height: 36px; background: white; border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text-secondary); }
        .control-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .tooltip { position: absolute; background: #1e293b; color: white; padding: 10px 14px; border-radius: 8px; font-size: 12px; z-index: 1000; pointer-events: none; max-width: 200px; }
        .tooltip.hidden { display: none; }
        .breadcrumb { position: absolute; top: 16px; left: 16px; background: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; z-index: 10; display: flex; align-items: center; gap: 6px; }
        .breadcrumb.hidden { display: none; }
        .breadcrumb-item { color: var(--primary); cursor: pointer; }
        .breadcrumb-item:hover { text-decoration: underline; }
        .breadcrumb-sep { color: #cbd5e1; }
        .breadcrumb-current { color: var(--text); font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🏭 产业链知识图谱</h1>
                <p>本地数据库 · 实时查询</p>
            </div>
            <div class="search-section">
                <div class="search-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索...">
                    <input type="number" class="depth-input" id="depthInput" placeholder="层级" min="1" max="99" title="追溯层级（留空=全部）">
                    <button class="search-btn" id="searchBtn">查询</button>
                </div>
                <div class="depth-info">💡 可设置追溯层级，留空则追溯全部关联关系</div>
            </div>
            <div class="node-detail" id="nodeDetail">
                <div class="detail-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    <p>输入关键词开始探索</p>
                    <p style="font-size:11px;margin-top:6px;color:#94a3b8">点击节点可切换为中心</p>
                </div>
            </div>
            <div class="legend">
                <div class="legend-title">图例</div>
                <div class="legend-items">
                    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div><span>中心节点</span></div>
                    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div><span>上游节点</span></div>
                    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div><span>下游节点</span></div>
                </div>
            </div>
        </div>
        <div class="graph-container">
            <div id="graph"></div>
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><circle cx="5" cy="19" r="2"/></svg>
                <h2>产业链知识图谱</h2>
                <p>输入关键词开始探索产业链</p>
            </div>
            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <p style="margin-top:12px;color:var(--text-secondary)">正在构建图谱...</p>
            </div>
            <div class="graph-controls">
                <button class="control-btn" id="zoomIn">+</button>
                <button class="control-btn" id="zoomOut">−</button>
                <button class="control-btn" id="resetZoom">⟲</button>
            </div>
            <div class="breadcrumb hidden" id="breadcrumb"></div>
        </div>
    </div>
    <div class="tooltip hidden" id="tooltip"></div>
    <script>
        const API = 'http://localhost:5001/api';
        // 颜色配置：红色=中心，黄色=上游，绿色=下游
        const COLORS = {
            center: '#ef4444',
            upstream: '#f59e0b',
            downstream: '#22c55e',
            unknown: '#94a3b8'
        };
        const TYPES = { industry: '行业', product: '产品', material: '材料', unknown: '待补充' };
        let svg, g, sim, zoom, w, h;
        let history = [];

        async function init() {
            initGraph();
            document.getElementById('searchBtn').onclick = () => search(document.getElementById('searchInput').value);
            document.getElementById('searchInput').onkeypress = e => { if (e.key === 'Enter') search(e.target.value); };
            document.getElementById('zoomIn').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.3);
            document.getElementById('zoomOut').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
            document.getElementById('resetZoom').onclick = () => svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity);
        }

        function initGraph() {
            const c = document.getElementById('graph');
            w = c.clientWidth; h = c.clientHeight;
            svg = d3.select('#graph').append('svg')
                .attr('width', '100%').attr('height', '100%')
                .attr('viewBox', `0 0 ${w} ${h}`)
                .style('background', 'transparent');
            svg.append('defs').append('marker').attr('id', 'arrow').attr('viewBox', '0 -5 10 10').attr('refX', 20).attr('refY', 0).attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto').append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#94a3b8');
            g = svg.append('g');
            zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform));
            svg.call(zoom);
            sim = d3.forceSimulation()
                .force('link', d3.forceLink().id(d => d.name).distance(120))
                .force('charge', d3.forceManyBody().strength(-500))
                .force('center', d3.forceCenter(w / 2, h / 2))
                .force('collision', d3.forceCollide().radius(45))
                .force('x', d3.forceX(w / 2).strength(0.05))
                .force('y', d3.forceY(h / 2).strength(0.05));
        }

        async function search(kw) {
            if (!kw.trim()) return;
            
            const emptyEl = document.getElementById('emptyState');
            emptyEl.classList.add('hidden');
            
            // 获取层级参数，留空=全部
            const depthVal = document.getElementById('depthInput').value.trim();
            const depthParam = depthVal ? parseInt(depthVal) : 0;
            
            showLoading(true);
            try {
                const r = await fetch(`${API}/graph?keyword=${encodeURIComponent(kw)}&depth=${depthParam}`);
                const d = await r.json();
                
                if (!d.found) {
                    // 清除之前的图谱
                    g.selectAll('*').remove();
                    
                    // 清空左下角的详情面板
                    document.getElementById('nodeDetail').innerHTML = `
                        <div class="detail-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                            <p>未找到相关数据</p>
                            <p style="font-size:11px;margin-top:6px;color:#94a3b8">尝试其他关键词</p>
                        </div>`;
                    
                    // 显示未找到的提示
                    emptyEl.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 15s1.5-2 4-2 4 2 4 2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                        <h2>暂无相关信息</h2>
                        <p>数据库中未找到 "${kw}" 相关记录</p>
                        <p style="font-size:12px;margin-top:8px;color:#94a3b8">已通知管理员补充数据</p>`;
                    emptyEl.classList.remove('hidden');
                    
                    // 【修复问题4】发送微信通知
                    sendNotification(kw);
                    
                    showLoading(false);
                    return;
                }
                
                // 更新历史（避免重复，只保留最近的搜索路径）
                if (history.length === 0 || history[history.length - 1] !== d.center.name) {
                    history.push(d.center.name);
                }
                updateBreadcrumb();
                
                render(d.data);
                showDetail(d.center);
            } catch (e) {
                console.error('搜索失败:', e);
                console.error('错误详情:', e.message, e.stack);
                alert('查询失败: ' + e.message);
            }
            showLoading(false);
        }

        function render(data) {
            // 【修复问题1】确保隐藏空状态
            document.getElementById('emptyState').classList.add('hidden');
            
            g.selectAll('*').remove();
            const nodes = data.nodes, links = data.links;
            
            // 根据节点数量动态调整布局参数
            const count = nodes.length;
            const scale = count > 30 ? 0.8 : count > 15 ? 0.9 : 1;
            const linkDist = count > 30 ? 120 : count > 15 ? 140 : 160;
            const chargeStr = count > 30 ? -600 : count > 15 ? -500 : -400;
            const chargeCenter = count > 30 ? -1000 : -800;
            const spreadRadius = count > 30 ? 350 : count > 15 ? 250 : 180;
            
            // 【修复问题2】根据方向设置颜色 + 初始位置
            nodes.forEach(n => {
                if (n.isCenter) {
                    n._color = COLORS.center;
                    n.x = w / 2;
                    n.y = h / 2;
                } else if (n.direction === 'upstream') {
                    n._color = COLORS.upstream;
                    const angle = (Math.random() - 0.5) * Math.PI * 0.9;
                    const dist = spreadRadius + Math.random() * spreadRadius;
                    n.x = w / 2 - Math.cos(angle) * dist;
                    n.y = h / 2 + Math.sin(angle) * dist;
                } else if (n.direction === 'downstream') {
                    n._color = COLORS.downstream;
                    const angle = (Math.random() - 0.5) * Math.PI * 0.9;
                    const dist = spreadRadius + Math.random() * spreadRadius;
                    n.x = w / 2 + Math.cos(angle) * dist;
                    n.y = h / 2 + Math.sin(angle) * dist;
                } else {
                    n._color = COLORS.unknown;
                }
            });
            
            const link = g.append('g').selectAll('line').data(links).enter().append('line')
                .attr('stroke', d => d.type === '依赖' ? '#f59e0b' : '#22c55e')
                .attr('stroke-width', 2)
                .attr('stroke-opacity', 0.5)
                .attr('marker-end', 'url(#arrow)');
            
            const node = g.append('g').selectAll('g').data(nodes).enter().append('g')
                .attr('cursor', 'pointer')
                .call(d3.drag()
                    .on('start', (e, d) => {
                        d._origX = d.x; d._origY = d.y;
                        if (!e.active) sim.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on('drag', (e, d) => {
                        d.fx = e.x; d.fy = e.y;
                    })
                    .on('end', (e, d) => {
                        if (!e.active) sim.alphaTarget(0);
                        const dist = Math.sqrt(Math.pow(d.x - d._origX, 2) + Math.pow(d.y - d._origY, 2));
                        if (dist < 3) {
                            if (!d.isPlaceholder && !d.isCenter) {
                                document.getElementById('searchInput').value = d.name;
                                search(d.name);
                            }
                        }
                        d.fx = null; d.fy = null;
                    })
                );
            
            node.append('circle')
                .attr('r', d => d.isCenter ? 30 : 22)
                .attr('fill', d => d._color)
                .attr('stroke', '#fff')
                .attr('stroke-width', d => d.isCenter ? 3 : 2)
                .on('mouseenter', (e, d) => {
                    const t = document.getElementById('tooltip');
                    const dirLabel = d.isCenter ? '【中心】' : (d.direction === 'upstream' ? '【上游】' : (d.direction === 'downstream' ? '【下游】' : ''));
                    t.innerHTML = `<b>${d.name}</b> ${dirLabel}<br><small>${TYPES[d.node_type] || '未知'}</small>`;
                    t.style.left = (e.pageX + 10) + 'px';
                    t.style.top = (e.pageY - 10) + 'px';
                    t.classList.remove('hidden');
                })
                .on('mouseleave', () => document.getElementById('tooltip').classList.add('hidden'));
            
            node.append('text')
                .attr('dy', d => d.isCenter ? 42 : 32)
                .attr('text-anchor', 'middle')
                .attr('font-size', '11px')
                .attr('fill', '#1e293b')
                .attr('font-weight', d => d.isCenter ? '600' : '400')
                .text(d => d.name.length > 6 ? d.name.slice(0, 6) + '..' : d.name);
            
            sim.nodes(nodes);
            sim.force('link').links(links).distance(linkDist);
            sim.force('charge').strength(d => d.isCenter ? chargeCenter : chargeStr);
            sim.force('collision').radius(45 * scale);
            sim.alpha(1.5).restart();
            
            // 等布局稳定后自动调整缩放，让图谱适配屏幕
            setTimeout(() => {
                sim.stop();
                const padding = 80;
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                nodes.forEach(n => {
                    if (n.x - 30 < minX) minX = n.x - 30;
                    if (n.x + 30 > maxX) maxX = n.x + 30;
                    if (n.y - 30 < minY) minY = n.y - 30;
                    if (n.y + 30 > maxY) maxY = n.y + 30;
                });
                const graphW = maxX - minX + padding * 2;
                const graphH = maxY - minY + padding * 2;
                const centerX = (minX + maxX) / 2;
                const centerY = (minY + maxY) / 2;
                const scaleVal = Math.min(w / graphW, h / graphH, 1.5);
                const tx = w / 2 - centerX * scaleVal;
                const ty = h / 2 - centerY * scaleVal;
                svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scaleVal));
            }, 1500);
            
            sim.on('tick', () => {
                link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

        function dragStart(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function drag(e, d) { d.fx = e.x; d.fy = e.y; }
        function dragEnd(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }

        function showDetail(n) {
            const typeLabel = TYPES[n.node_type] || '未知';
            const dirLabel = n.isCenter ? '【中心节点】' : '';
            document.getElementById('nodeDetail').innerHTML = `
                <div class="detail-card">
                    <div class="detail-header">
                        <span class="detail-type-badge ${n.node_type}">${typeLabel}</span>
                        <span class="detail-title">${n.name} ${dirLabel}</span>
                    </div>
                    <div class="detail-body">
                        <div class="detail-description">${n.description || '暂无描述'}</div>
                        ${n.meta?.length ? `<div class="detail-meta">${n.meta.map(m => `<span class="detail-meta-item">${m}</span>`).join('')}</div>` : ''}
                        ${n.upstream?.length ? `
                            <div class="detail-section">
                                <div class="detail-section-title upstream">⬆ 上游 (${n.upstream.length})</div>
                                <div class="relation-list">${n.upstream.map(x => `<span class="relation-tag upstream" onclick="search('${x}')">${x}</span>`).join('')}</div>
                            </div>` : ''}
                        ${n.downstream?.length ? `
                            <div class="detail-section">
                                <div class="detail-section-title downstream">⬇ 下游 (${n.downstream.length})</div>
                                <div class="relation-list">${n.downstream.map(x => `<span class="relation-tag downstream" onclick="search('${x}')">${x}</span>`).join('')}</div>
                            </div>` : ''}
                    </div>
                </div>`;
        }

        function updateBreadcrumb() {
            const el = document.getElementById('breadcrumb');
            if (history.length <= 1) {
                el.classList.add('hidden');
                return;
            }
            el.classList.remove('hidden');
            el.innerHTML = history.slice(-5).map((name, i, arr) => {
                if (i === arr.length - 1) {
                    return `<span class="breadcrumb-current">${name}</span>`;
                }
                return `<span class="breadcrumb-item" onclick="goBack(${i})">${name}</span><span class="breadcrumb-sep">›</span>`;
            }).join('');
        }

        function goBack(index) {
            const targetName = history[index];
            history = history.slice(0, index);
            document.getElementById('searchInput').value = targetName;
            search(targetName);
        }

        function showLoading(show) { 
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show); 
        }

        // 【修复问题4】发送微信通知
        async function sendNotification(keyword) {
            try {
                await fetch(`${API}/notify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `🔔 知识图谱数据缺失提醒\n\n有用户搜索「${keyword}」，但数据库中没有相关记录，请及时补充。`
                    })
                });
                console.log('已发送通知');
            } catch (e) {
                console.log('通知发送失败:', e);
            }
        }

        // 全局函数
        window.search = search;
        window.goBack = goBack;
        
        init();
    </script>
</body>
